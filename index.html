<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>For My Universe ❤️</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;600&family=Dancing+Script:wght@700&display=swap" rel="stylesheet">

    <link rel="stylesheet" href="style.css">
</head>
<body>

<div id="stars"></div>
<div id="shooting-stars"></div>

<audio id="bgMusic" loop>
    <!-- If you later add your own music file with permission, name it music.mp3 -->
    <source src="music.mp3" type="audio/mpeg">
</audio>

<section id="intro">

    <div class="moon"></div>

    <h3 class="small">For My Universe</h3>

    <h1>Happy 4th Monthsary, Honhon ❤️</h1>

    <p>
        Somewhere among all these stars...
        <br>
        I found my favorite universe.
    </p>

    <button id="beginButton">
        ⭐ Click to Begin
    </button>

</section>

<section id="letterSection" class="hidden">

    <div class="envelope" id="envelope">

        <div class="flap"></div>

        <div class="paper">

            <img src="photo.png" alt="Us together" class="photo">

            <h2>To My Favorite Person ❤️</h2>

            <div id="typedLetter"></div>

            <div id="counter" class="counter"></div>

            <button id="moonButton">
                🌙 Touch the Moon
            </button>

        </div>

    </div>

</section>

<section id="ending" class="hidden">

    <div class="moonHeart">
        ❤️
    </div>

    <h1>I LOVE YOU</h1>

    <p>
        Happy Monthsary, Honhon.
        <br><br>

        Thank you for letting me love you.
        <br><br>

        — Merry ❤️
    </p>

</section>

<script>

const letter = `

There's this post I read on Threads that said men lose interest when women are too in love with them. It made me pause for a minute. I wondered if you'd feel the same way. Should I stop myself from loving you this much?

But no, I want you to know that I am deeply in love with you. I care about you, and you excite me. I always look forward to your messages. I crave hearing your voice all the time. There's nothing I long for more than to feel the warmth of your embrace.

I can't wait to press my hands against your cheeks so I can get a good look at your pretty face. Thank you for allowing me to love you. Thank you for letting me into your life.

I hope you never get tired of me, but even if you do, I'll never regret showing you and telling you how much I adore you. Life is too short for me to hold my feelings back, and I think I'd regret it even more if I didn't let you know just how obsessed I am with you.

I love you so much, JC.

❤️

`;

</script>

<script src="script.js"></script>

</body>
</html>
